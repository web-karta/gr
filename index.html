<!DOCTYPE html>
<html lang="HR">
  <head>
      <meta charset="utf-8">
      <title>Web-karta Općine Grude</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
      <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">

    <style>
      html, body, #map {
      height: 100%;
      width: 100%;
      margin: 0;
      overflow: hidden;
      }

      .leaflet-popup-tip {
        display: none;
      }

      .leaflet-popup-content-wrapper {
      background: rgb(235,235,235);
      color: black;
      }

      .popup-title {
      font-family: "PT Serif", serif;
      font-size: 10pt;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
      }

      .popup-grid {
      display: grid;
      grid-template-columns: 80px 1fr;
      column-gap: 6px;
      row-gap: 2px;
      font-family: "PT Sans", sans-serif;
      font-size: 9pt;
      text-align: justify;
      }

      .popup-grid .lbl {
      text-align: left;
      }

      .popup-grid .val {
      text-align: left;
      word-break: break-word;
      }

      .leaflet-popup-content {
      font-family: "PT Sans", sans-serif;
      max-height: 55vh;
      font-size: 9pt;
      line-height: 1.3;
      overflow-y: auto;
      }

    </style>

  </head>
  <body>
      <div id="map"></div>
      <div id="viewer" style="
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      z-index: 999;
      ">
      <iframe id="frame" style="width:100%;height:100%;border:0;"></iframe>
    </div>

      <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
      <script src="crkve.js"></script>
      <script src="groblja.js"></script>


    <script>

      var bounds = [[43, 17],[44, 18]];
      var map = L.map('map', {
      maxBounds: bounds,
      maxBoundsViscosity: 1.0,
      zoomControl: false
      }).setView([43.3544, 17.3741], 12);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { 
      maxZoom: 19,
      minZoom: 10 
      }).addTo(map);

      function okvir() {
	    const isMobile = window.innerWidth < 600;
      const popupWidth = isMobile ? 225 * 0.8 : 225;

      return {
      maxWidth: popupWidth,
      minWidth: popupWidth
      };
      }

      let mode = "3D";
      const url3D = "index.html";
      const url2D = "https://virtualtours.virtualno360.hr/F1aR2rgBvf/46190512p&27.02h&80.17t";
      var toggleControl = L.control({ position: 'topright' });
      toggleControl.onAdd = function () {
      var div = L.DomUtil.create('div');
      div.innerHTML = "3D";
      div.style.width = "44px";
      div.style.height = "44px";
      div.style.borderRadius = "50%";
      div.style.background = "white";
      div.style.display = "flex";
      div.style.alignItems = "center";
      div.style.justifyContent = "center";
      div.style.cursor = "pointer";
      div.style.fontWeight = "700";
      div.style.fontFamily = "PT Sans";
      div.style.boxShadow = "0 1px 4px rgba(0,0,0,0.3)";
      div.onclick = function () {
      const viewer = document.getElementById("viewer");
      const frame = document.getElementById("frame");

      if (mode === "3D") {
      mode = "2D";
      div.innerHTML = "2D";
      viewer.style.display = "block";
      frame.src = url2D;
      } else {
      mode = "3D";
      div.innerHTML = "3D";
      viewer.style.display = "none";
      frame.src = "";
      }
      };
      return div;
      };
      toggleControl.addTo(map);

      var Crkve = L.icon({
      iconUrl: 'Oznake/Crkve.svg',
      iconSize: [20,20],
      iconAnchor: [10,10]
      });

      L.geoJSON(crkve, {
      pointToLayer: function(feature, latlng){
      return L.marker(latlng,{icon:Crkve});
      },
      onEachFeature: function(feature, layer){

      var okvirCrkve = `
      <div class="popup-title">${feature.properties["Naziv crkve"]}</div>
      <div class="popup-grid">
      <div class="lbl">Župa:</div><div class="val">${feature.properties["Župa"]}</div>
      <div class="lbl">Mjesto:</div><div class="val">${feature.properties["Mjesto"]}</div>
      <div class="lbl">Vrsta crkve:</div><div class="val">${feature.properties["Vrsta crkve"]}</div>
      <div class="lbl">Građena:</div><div class="val">${feature.properties["Godina izgradnje"]}</div>
      <div class="lbl">Značaj:</div><div class="val">${feature.properties["Značaj"]}</div>
      <div class="lbl">Web-stranica:</div>
      <div class="val">${feature.properties["Web-stranica"] !== "nema"
      ? `<a href="${feature.properties["Web-stranica"]}" target="_blank">Otvori</a>` : "nema"}
      </div>
      </div>
      `;

      layer.bindPopup(okvirCrkve, okvir());
      }}).addTo(map);

      var Groblja = L.icon({
      iconUrl: 'Oznake/Groblja.svg',
      iconSize: [20,20],
      iconAnchor: [10,10]
      });

      L.geoJSON(groblja, {
      pointToLayer: function(feature, latlng){
      return L.marker(latlng,{icon:Groblja});
      },
      onEachFeature: function(feature, layer){

      var okvirGroblja = `
      <div class="popup-title">${feature.properties["Naziv groblja"]}</div>
      <div class="popup-grid">
      <div class="lbl">Župa:</div><div class="val">${feature.properties["Župa"]}</div>
      <div class="lbl">Mjesto:</div><div class="val">${feature.properties["Mjesto"]}</div>
      <div class="lbl">Vrsta groblja:</div><div class="val">${feature.properties["Vrsta groblja"]}</div>
      <div class="lbl">Mrtvačnica:</div><div class="val">${feature.properties["Mrtvačnica"]}</div>
      <div class="lbl">Značaj:</div><div class="val">${feature.properties["Značaj"]}</div>
      </div>
      </div>
      `;

      layer.bindPopup(okvirGroblja, okvir());
      }}).addTo(map);

    </script>

  </body>
</html>
