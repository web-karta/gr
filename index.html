<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="utf-8">
<title>Crkve</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&family=PT+Serif:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body, #map {
  height: 100%;
  margin: 0;
}

.leaflet-popup-tip {
  display: none;
}
.leaflet-popup-content-wrapper {
  background: rgb(235,235,235);
  color: black;
}

.popup-title {
  font-family: "PT Serif", serif;
  font-size: 10pt;
  font-weight: 700;
  text-align: center;
  margin-bottom: 4px;
}

.popup-grid {
  display: grid;
  grid-template-columns: 80px 1fr;
  column-gap: 6px;
  row-gap: 2px;
  font-family: "PT Sans", sans-serif;
  font-size: 9pt;
text-align: justify;
}

.popup-grid .lbl {
  text-align: left;
}

.popup-grid .val {
  text-align: left;
word-break: break-word;
}
.leaflet-popup-content {
  font-family: "PT Sans", sans-serif;
max-height: 55vh;
overflow-y: auto;
}

.leaflet-popup-content {
  font-family: "PT Sans", sans-serif;
  font-size: 9pt;
  line-height: 1.3;
}


/* QGIS stil */
.crkva-marker {
  position: relative;
  width: 10px;
  height: 10px;
}

.crkva-marker .circle {
  width: 10px;
  height: 10px;
  background: black;
  border-radius: 50%;
}

.crkva-marker .cross {
  position: absolute;
  left: -3px;
  top: -3px;
  width: 16px;
  height: 16px;
  transform: rotate(45deg);
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="crkve.js"></script>

<script>

var bounds = [
  [43, 17], // jugozapad
  [44, 18]  // sjeveroistok
];

var map = L.map('map', {
  maxBounds: bounds,
  maxBoundsViscosity: 1.0
}).setView([43.3544, 17.3741], 12);
L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  { maxZoom: 19,
minZoom: 10 }
).addTo(map);

var icon = L.divIcon({
  className: '',
  html: `
    <div class="crkva-marker">
      <div class="circle"></div>
      <div class="cross"></div>
    </div>
  `,
  iconSize: [10,10],
  iconAnchor: [5,5]
});

L.geoJSON(crkve,{

  pointToLayer: function(feature, latlng){
    return L.marker(latlng,{icon:icon});
  },

  onEachFeature: function(feature, layer){

    var p = feature.properties;

var popup = `
  <div class="popup-title">${p["Naziv crkve"]}</div>

  <div class="popup-grid">
    <div class="lbl">Župa:</div><div class="val">${p["Župa"]}</div>
    <div class="lbl">Mjesto:</div><div class="val">${p["Mjesto"]}</div>
    <div class="lbl">Vrsta:</div><div class="val">${p["Vrsta crkve"]}</div>
    <div class="lbl">Godina:</div><div class="val">${p["Godina izgradnje"]}</div>
    <div class="lbl">Značaj:</div><div class="val">${p["Značaj"]}</div>

    <div class="lbl">Web-stranica:</div>
    <div class="val">
      ${p["Web-stranica"] !== "nema"
        ? `<a href="${p["Web-stranica"]}" target="_blank">Otvori</a>`
        : "nema"}
    </div>
  </div>
`;
layer.bindPopup(popup,{
  minWidth:225,
  maxWidth:225
});
  }

}).addTo(map);
</script>

</body>
</html>
